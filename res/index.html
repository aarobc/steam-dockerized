<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Remote Play - Display Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b 0%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-weight: 300;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            padding: 20px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button span.sub {
            font-size: 13px;
            font-weight: 400;
            color: #94a3b8;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.selected {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--primary);
            color: #60a5fa;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status.show {
            opacity: 1;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Display Resolution</h1>
        <p>Select a resolution for your Steam Remote Play session. The container will restart immediately.</p>
        
        <div class="grid">
            <button onclick="setResolution('1280x800', this)">
                Steam Deck
                <span class="sub">1280 x 800 (16:10)</span>
            </button>
            <button onclick="setResolution('1920x1080', this)">
                1080p
                <span class="sub">1920 x 1080 (16:9)</span>
            </button>
            <button onclick="setResolution('2560x1440', this)">
                1440p (2K)
                <span class="sub">2560 x 1440 (16:9)</span>
            </button>
            <button onclick="setResolution('3840x2160', this)">
                4K UHD
                <span class="sub">3840 x 2160 (16:9)</span>
            </button>
        </div>

        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        async function setResolution(res, btn) {
            const statusEl = document.getElementById('statusMessage');
            
            // UI feedback
            document.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            statusEl.textContent = 'Restarting Steam container...';
            statusEl.className = 'status show';

            try {
                const formData = new URLSearchParams();
                formData.append('resolution', res);
                
                const response = await fetch('/set', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                });

                if (response.ok) {
                    statusEl.textContent = 'Success! Reconnect to your Remote Play session.';
                    statusEl.className = 'status show success';
                } else {
                    const text = await response.text();
                    throw new Error(text);
                }
            } catch (err) {
                statusEl.textContent = `Error: ${err.message}`;
                statusEl.className = 'status show error';
            }
        }
    </script>
</body>
</html>
