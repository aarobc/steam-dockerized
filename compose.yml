services:
  steam:
    ipc: host
    build: .
    # restart: unless-stopped
    network_mode: host  # Disabled to use port mappings for Sunshine
    privileged: true

    environment:
      - PUID=1000
      - PGID=1000
      - RENDER_GID=989
      - TZ=America/Denver
      # Graphics Backend
      - WLR_RENDERER=vulkan
      - AMD_VULKAN_ICD=RADV
      - WLR_DRM_NO_MODIFIERS=1
      - WLR_BACKENDS=headless
      - WLR_LIBINPUT_NO_DEVICES=1
      - WLR_RENDERER=pixman
      - XDG_CURRENT_DESKTOP=sway

    # entrypoint: []
    volumes:
      - ./data:/home/retro

      # 2. SHARED GAMES (Read/Write)
      - ${HOME}/.local/share/Steam/steamapps:/mnt/local/SteamLibrary/steamapps
      - /mnt/ntfs/SteamLibrary:/mnt/ntfs/SteamLibrary

      # 3. SYSTEM
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    # tmpfs:
    #   - /run/dbus:mode=0755

    devices:
      - /dev/dri:/dev/dri
      - /dev/uinput:/dev/uinput
      - /dev/input:/dev/input  # Added for Sunshine input handling

    ports:
      - "5900:5900"
      # Sunshine game streaming ports
      # - "47984-47990:47984-47990/tcp"  # Web UI (47990) + control
      # - "48010:48010/tcp"              # Additional control
      # - "47998-48000:47998-48000/udp"  # Streaming traffic

    command: /home/retro/start.sh xeyes
