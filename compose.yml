services:
  steam:
    ipc: host
    build:
      context: .
      target: amd
    network_mode: host
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

    cap_add:
      - SYS_NICE      # Required for Gamescope priority/performance
      - SYS_PTRACE    # Required for Proton/Wine anti-cheat and process handling

    environment:
      - WLR_DRM_NO_MODIFIERS=1
      - WLR_BACKENDS=headless
      - WLR_RENDERER=pixman

    volumes:
      - ./data/.config:/home/retro/.config
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/input:/dev/input

    devices:
      - /dev/fuse
      - /dev/dri:/dev/dri
      - /dev/uinput:/dev/uinput
    device_cgroup_rules:
      - 'c 13:* rmw'       # Input devices (joysticks, gamepads)
      - 'c 226:* rmw'      # DRI/GPU devices
      - 'c 10:223 rmw'     # uinput (virtual controller creation)

    command: gamescope --backend headless -e -W ${GAMESCOPE_W:-1280} -H ${GAMESCOPE_H:-800} -w ${GAMESCOPE_W:-1280} -h ${GAMESCOPE_H:-800} -r ${GAMESCOPE_R:-60} -- steam -steamos3 -gamepadui

  res:
    build: ./res
    container_name: res
    ports:
      - "8080:8080"
    volumes:
      - ./:/project
      - /var/run/docker.sock:/var/run/docker.sock
